---
# Backend services pointing to application ports (bypassing Caddy)
# Used by Ingress for direct access to emulators
apiVersion: v1
kind: Service
metadata:
  name: github-emulator-backend
  namespace: ai-pipeline
  labels:
    app: github-emulator
spec:
  type: ClusterIP
  selector:
    app: github-emulator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: jira-emulator-backend
  namespace: ai-pipeline
  labels:
    app: jira-emulator
spec:
  type: ClusterIP
  selector:
    app: jira-emulator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: mcp
      port: 8081
      targetPort: 8081
      protocol: TCP
