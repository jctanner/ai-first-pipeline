---
# Ingress for GitHub Emulator
# Routes to backend application port (8000), bypassing Caddy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-emulator
  namespace: ai-pipeline
  annotations:
    cert-manager.io/issuer: internal-ca-issuer
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - github-emulator.ai-pipeline.svc.cluster.local
    secretName: github-emulator-tls
  rules:
  - host: github-emulator.ai-pipeline.svc.cluster.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: github-emulator-backend
            port:
              number: 8000
