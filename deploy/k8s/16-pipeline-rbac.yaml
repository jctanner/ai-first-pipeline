---
# ServiceAccount for Pipeline Dashboard
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-dashboard
  namespace: ai-pipeline
---
# ServiceAccount for Job pods (used by markovd and dashboard when creating jobs)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-agent
  namespace: ai-pipeline
---
# Role with permissions to manage Jobs and Pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-orchestrator
  namespace: ai-pipeline
rules:
# Job management
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
# Pod access (for logs)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# ConfigMap management (for workflow definitions)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update", "delete"]
# PVC access (for artifact volume discovery)
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list"]
# Secret access (for listing available secrets to mount to jobs)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-orchestrator-binding
  namespace: ai-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-orchestrator
subjects:
- kind: ServiceAccount
  name: pipeline-dashboard
  namespace: ai-pipeline
- kind: ServiceAccount
  name: markovd
  namespace: ai-pipeline
- kind: ServiceAccount
  name: pipeline-agent
  namespace: ai-pipeline
