---
# Test Ingress - Simple HTTP routing to Caddy port 80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jira-simple
  namespace: ai-pipeline
spec:
  ingressClassName: traefik
  rules:
  - host: jira.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jira-emulator
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: github-simple
  namespace: ai-pipeline
spec:
  ingressClassName: traefik
  rules:
  - host: github.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: github-emulator
            port:
              number: 80
