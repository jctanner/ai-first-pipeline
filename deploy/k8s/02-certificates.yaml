---
# Certificate for GitHub Emulator
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: github-emulator-tls
  namespace: ai-pipeline
spec:
  secretName: github-emulator-tls
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days

  commonName: github-emulator.ai-pipeline.svc.cluster.local

  dnsNames:
    - github-emulator
    - github-emulator.ai-pipeline
    - github-emulator.ai-pipeline.svc
    - github-emulator.ai-pipeline.svc.cluster.local
    - github.local

  ipAddresses:
    - 192.168.56.10

  privateKey:
    algorithm: RSA
    size: 2048

  issuerRef:
    name: internal-ca-issuer
    kind: Issuer
---
