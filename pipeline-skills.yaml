# Pipeline skill configuration
#
# Maps pipeline phases to skill sources and invocation methods.
#
# skill_repos:
#   Each entry names a cloned external repository whose .claude/skills/
#   directory contains skills the pipeline can use.
#
# phases:
#   skill         - name of the skill directory (under .claude/skills/)
#   source        - (optional) key in skill_repos; omit for local skills
#   invoke        - "templated" (default) or "native"
#   allowed_tools - (optional) tools the agent needs; defaults to
#                   [Read, Write, Glob, Grep]
#
# Invocation methods:
#   templated  - extract SKILL.md instructions and inject them into the
#                agent prompt alongside issue data (deterministic, batch-
#                friendly).
#   native     - enable SDK skill discovery (setting_sources=["project"])
#                so the agent can invoke skills via the Skill tool.  When
#                source is set, cwd is pointed at the external repo so the
#                agent also gets CLAUDE.md, scripts, sub-skills, and
#                companion files from that repo.

mcp_servers:
  atlassian:
    type: sse
    url: ${ATLASSIAN_MCP_URL:-http://127.0.0.1:8081/sse}

skill_repos:
  rfe-creator:
    path: references/rfe-creator

phases:
  # === Bug analysis (local skills, templated) ===
  completeness:
    skill: bug-completeness

  context-map:
    skill: bug-context-map

  fix-attempt:
    skill: bug-fix-attempt

  test-plan:
    skill: bug-test-plan

  write-test:
    skill: bug-write-test

  # === Bug validation (local skill, native) ===
  patch-validation:
    skill: patch-validation
    invoke: native
    allowed_tools: [Read, Write, Glob, Grep, Bash]

  # === RFE phases (external skills, native) ===
  rfe-create:
    skill: rfe.create
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]

  rfe-review:
    skill: rfe.review
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  rfe-split:
    skill: rfe.split
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  rfe-submit:
    skill: rfe.submit
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]

  # === Strategy phases (external skills, native) ===
  strat-create:
    skill: strat.create
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  strat-refine:
    skill: strat.refine
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep]

  strat-review:
    skill: strat.review
    source: rfe-creator
    invoke: native
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]

  strat-submit:
    skill: strat-submit
    invoke: native
    allowed_tools: [Read, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  strat-security-review:
    skill: strat-security-review
    invoke: native
    allowed_tools: [Read, Write, Glob, Grep, Bash]
    mcp_servers: [atlassian]
