# Pipeline skill configuration
#
# Maps pipeline skills to their sources, invocation methods, and tool permissions.
#
# skill_repos:
#   Each entry names an external repository whose .claude/skills/
#   directory contains skills the pipeline can use.
#   - github: owner/repo on GitHub (used for display and installation)
#   - path: local checkout path (for development / templated invocation)
#   - registry: marketplace plugin name (for K8s runner installation)
#
# skills:
#   skill         - name of the skill directory (under .claude/skills/)
#   source        - (optional) key in skill_repos; omit for local skills
#   invoke        - "templated" (default) or "native"
#   allowed_tools - (optional) tools the agent needs; defaults to
#                   [Read, Write, Glob, Grep]
#
# Invocation methods:
#   templated  - extract SKILL.md instructions and inject them into the
#                agent prompt alongside issue data (deterministic, batch-
#                friendly).
#   native     - enable SDK skill discovery (setting_sources=["project"])
#                so the agent can invoke skills via the Skill tool.  When
#                source is set, cwd is pointed at the external repo so the
#                agent also gets CLAUDE.md, scripts, sub-skills, and
#                companion files from that repo.

mcp_servers:
  atlassian:
    type: sse
    url: ${ATLASSIAN_MCP_URL:-http://127.0.0.1:8081/sse}

skill_repos:
  rfe-creator:
    github: jwforres/rfe-creator
    path: remote_skills/rfe-creator
    registry: rfe-creator@opendatahub-skills
  strat-creator:
    github: ederign/strat-creator
    path: remote_skills/strat-creator
    registry: strat-creator@opendatahub-skills

skills:
  # === Bug analysis (local skills, templated) ===
  bug-completeness:
    skill: bug-completeness

  bug-context-map:
    skill: bug-context-map

  bug-fix-attempt:
    skill: bug-fix-attempt

  bug-test-plan:
    skill: bug-test-plan

  bug-write-test:
    skill: bug-write-test

  # === Bug validation (local skill, native) ===
  patch-validation:
    skill: patch-validation
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Glob, Grep, Bash]

  # === RFE skills (jwforres/rfe-creator) ===
  rfe-create:
    skill: rfe.create
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]

  rfe-review:
    skill: rfe.review
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  rfe-split:
    skill: rfe.split
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  rfe-submit:
    skill: rfe.submit
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]

  rfe-speedrun:
    skill: rfe.speedrun
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash, Skill]
    mcp_servers: [atlassian]

  # === Strategy skills (jwforres/rfe-creator) ===
  strat-create:
    skill: strat.create
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  strat-create-local:
    skill: strat.create.local
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash, AskUserQuestion]
    mcp_servers: [atlassian]

  strat-refine:
    skill: strat.refine
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep]

  strat-review:
    skill: strat.review
    source: rfe-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]

  strat-submit:
    skill: strat.submit
    invoke: native
    runner: cli
    allowed_tools: [Read, Glob, Grep, Bash]
    mcp_servers: [atlassian]

  strat-security-review:
    skill: strat.security.review
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Glob, Grep, Bash, Skill]
    mcp_servers: [atlassian]

  # === Strategy skills (ederign/strat-creator) ===
  strategy-create:
    skill: strategy.create
    source: strat-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash, AskUserQuestion]
    mcp_servers: [atlassian]

  strategy-refine:
    skill: strategy.refine
    source: strat-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep]

  strategy-review:
    skill: strategy.review
    source: strat-creator
    invoke: native
    runner: cli
    allowed_tools: [Read, Write, Edit, Glob, Grep, Bash, Skill]
