---
# ====================================================================
# Batch RFE Pipeline
# ====================================================================
#
# End-to-end pipeline for processing RHAIRFE tickets through the full
# agentic SDLC lifecycle:
#
#   1. Recursively paginate through open RHAIRFE tickets from Jira
#   2. Per page: fan out to per-ticket sub-workflows (for_each)
#   3. Per ticket: RFE speedrun → quality gate → strategy creation →
#      strategy refinement → strategy review → security review →
#      epic creation → per-epic fan-out
#   4. After each page completes, recurse to fetch the next page
#      until the entire backlog is drained
#
# Architecture:
#
#   batch-rfe-pipeline (entrypoint)
#     └─ batch-loop (recursive pagination, batch_size per page)
#          ├─ fetch_page (Jira REST with startAt offset)
#          ├─ process_tickets (for_each over this page's tickets)
#          │    └─ per-ticket
#          │         ├─ rfe-speedrun-retry (recursive, max 3 attempts)
#          │         ├─ review_quality_gate (rules: approve/pause/reject)
#          │         ├─ strategy-create-retry (recursive, max 3 attempts)
#          │         ├─ strategy-refine-retry (recursive, max 3 attempts)
#          │         ├─ strategy-review-retry (recursive, max 3 attempts)
#          │         ├─ security_review_gate (skip if already reviewed)
#          │         ├─ security-review-retry (recursive, max 3 attempts)
#          │         ├─ epic-create-retry (recursive, max 3 attempts)
#          │         └─ epic-breakdown (for_each over created epics, stub)
#          ├─ pagination_gate (rules: has_more / done)
#          └─ next_page (recurse with offset += batch_size)
#
# Idempotency:
#   Every step checks for existing artifacts before doing work.
#   Symlinks in strat-tasks/ map RFE keys to RHAISTRAT keys.
#   Receipt artifacts in epic-receipts/ prevent duplicate epic creation.
#   The rfe-speedrun-retry sub-workflow uses recursive gated retries
#   to handle non-deterministic agent failures gracefully.
#
# Usage:
#   # Process entire backlog in pages of 10 (default)
#   markov run batch-rfe-pipeline.yaml
#
#   # Larger pages (20 tickets per batch)
#   markov run batch-rfe-pipeline.yaml --var max_tickets=20
#
#   # Process a specific ticket
#   markov run batch-rfe-pipeline.yaml --var jql="key = RHAIRFE-1985"
#
#   # Override concurrency
#   markov run batch-rfe-pipeline.yaml --forks 20

entrypoint: batch-rfe-pipeline

namespace: ai-pipeline

# Global concurrency limit for all for_each fan-outs
forks: 10

vars:
  model: opus
  jql: "project = RHAIRFE AND statusCategory != Done"
  max_tickets: 10

# ====================================================================
# Rules
# ====================================================================
# Rules are evaluated by the Grule forward-chaining engine inside gate
# steps. Multiple rules can fire per gate; the highest-salience fired
# rule's action (continue/skip/pause) determines the gate outcome.
# Facts set by any fired rule persist in the workflow context.

rules:

  # ── RFE quality gate rules ──────────────────────────────────────
  # Used by review_quality_gate to route tickets based on review score.
  # Higher salience wins: reject (200) > approve (100) > attention (50).

  - name: rfe_auto_approve
    description: "Auto-approve reviews with perfect scores"
    salience: 100
    when: "review_passed and review_score >= 8"
    action: continue
    set_fact:
      rfe_auto_approved: true

  - name: rfe_needs_attention
    description: "Flag reviews that need human attention"
    salience: 50
    when: "review_passed and review_score >= 4 and review_score < 8"
    action: pause
    set_fact:
      rfe_needs_attention: true

  - name: rfe_not_passing
    description: "Block RFEs that failed review regardless of score"
    salience: 150
    when: "not review_passed"
    action: skip
    set_fact:
      rfe_rejected: true
      reject_reason: "Review did not pass"

  - name: rfe_reject
    description: "Reject reviews with low scores"
    salience: 200
    when: "review_score < 4"
    action: skip
    set_fact:
      rfe_rejected: true
      reject_reason: "Review score below threshold"

  # ── Security review gate rules ──────────────────────────────────

  - name: strat_skip_if_security_reviewed
    description: "Skip security review if already done"
    salience: 100
    when: "strat_already_security_reviewed"
    action: skip

  # ── Batch loop rules ─────────────────────────────────────────────
  # Used by batch-loop to control pagination through the Jira backlog.
  # After each batch, check if more tickets exist beyond the current offset.

  - name: batch_has_more
    description: "More tickets remain in the Jira backlog"
    salience: 100
    when: "batch_offset < batch_total"
    action: continue

  - name: batch_done
    description: "All tickets have been processed"
    salience: 200
    when: "batch_offset >= batch_total"
    action: skip
    set_fact:
      batch_complete: true

  # ── Retry loop rules ────────────────────────────────────────────
  # Used by rfe-speedrun-retry to control recursive retry behavior.
  # Highest salience wins: ready (200) > exhausted (150) > continue (100).

  - name: retry_artifacts_ready
    description: "Artifacts exist, no retry needed"
    salience: 200
    when: "artifacts_ready"
    action: skip
    set_fact:
      retry_done: true

  - name: retry_continue
    description: "Artifacts missing, retries remaining"
    salience: 100
    when: "not artifacts_ready and retries_remaining > 0"
    action: continue
    set_fact:
      retry_done: false

  - name: retry_exhausted
    description: "Artifacts missing, no retries left"
    salience: 150
    when: "not artifacts_ready and retries_remaining <= 0"
    action: skip
    set_fact:
      retry_done: true
      retry_failed: true

# ====================================================================
# Step Types
# ====================================================================
# Custom step types that extend markov's built-in types. agent_job
# extends k8s_job with the full pipeline-agent container spec including
# all PVC mounts, secrets, init containers, and pod affinity.

step_types:
  agent_job:
    base: k8s_job
    description: "Run a pipeline-agent skill as a K8s Job"
    job:
      image: pipeline-agent:latest
      backoff_limit: 0
      ttl_seconds: 86400
      service_account: pipeline-dashboard
      init_containers:
        - name: update-ca-trust
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -ex
              apk add --no-cache ca-certificates
              if [ -f /tmp/ca-cert/ca.crt ]; then
                mkdir -p /usr/local/share/ca-certificates
                cp /tmp/ca-cert/ca.crt /usr/local/share/ca-certificates/internal-ca.crt
                update-ca-certificates
                cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt
                echo "CA trust store updated successfully"
              else
                echo "No CA cert found, skipping"
                cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt || touch /shared/ca-certificates.crt
              fi
          volume_mounts:
            - name: ca-cert
              mount_path: /tmp/ca-cert
            - name: shared-ca
              mount_path: /shared
      env:
        GOOGLE_APPLICATION_CREDENTIALS: /home/pipelineagent/.config/gcloud/credentials.json
        MLFLOW_TRACKING_URI: http://mlflow.ai-pipeline.svc.cluster.local:5000
      secrets:
        - pipeline-secrets
      volumes:
        - name: pipeline-issues
          mount: /app/issues
          pvc: pipeline-issues
        - name: pipeline-workspace
          mount: /app/workspace
          pvc: pipeline-workspace
        - name: pipeline-logs
          mount: /app/logs
          pvc: pipeline-logs
        - name: pipeline-artifacts
          mount: /app/artifacts
          pvc: pipeline-artifacts
        - name: pipeline-context
          mount: /app/.context
          pvc: pipeline-context
        - name: gcp-credentials
          mount: /home/pipelineagent/.config/gcloud
          secret: gcp-credentials
          read_only: true
        - name: shared-ca
          mount: /shared
          type: emptyDir
          read_only: true
        - name: ca-cert
          type: configMap
          config_map: internal-ca-cert
      resources:
        requests:
          memory: 2Gi
          cpu: 500m
        limits:
          memory: 8Gi
          cpu: 2000m
      affinity:
        pod_affinity:
          required:
            match_labels:
              app: pipeline-dashboard
            topology_key: kubernetes.io/hostname

# ====================================================================
# Workflows
# ====================================================================
workflows:

  # ------------------------------------------------------------------
  # batch-rfe-pipeline (entrypoint)
  #
  # Thin wrapper that kicks off the recursive batch-loop workflow.
  # The loop fetches tickets in pages of batch_size, processes each
  # page via for_each, then recurses with an incremented offset until
  # the entire Jira backlog is exhausted.
  # ------------------------------------------------------------------
  - name: batch-rfe-pipeline
    description: "Process all open RFEs through the full pipeline in paginated batches"

    steps:
      - name: start_batch_loop
        workflow: batch-loop
        vars:
          jql: "{{ jql }}"
          model: "{{ model }}"
          batch_size: "{{ max_tickets }}"
          batch_offset: 0

  # ------------------------------------------------------------------
  # batch-loop (recursive pagination)
  #
  # Each iteration:
  #   1. Fetch one page of tickets (batch_size at batch_offset)
  #   2. The fetch script returns {issues: [...], total: N}
  #   3. Fan out per-ticket sub-workflows for this page
  #   4. Advance the offset by the number of tickets fetched
  #   5. Gate check: if offset >= total, stop; otherwise recurse
  #
  # This drains the entire Jira backlog without needing to know the
  # total count up front. The batch_done gate rule (salience 200) stops
  # the loop when all tickets have been paged through.
  # ------------------------------------------------------------------
  - name: batch-loop
    vars:
      jql: null
      model: opus
      batch_size: 10
      batch_offset: 0

    steps:

      # Fetch one page of ticket keys from Jira. The script returns a
      # JSON object with "issues" (array of {key: ...}) and "total"
      # (the full result count from the JQL query). startAt controls
      # pagination offset; maxResults is capped at batch_size.
      - name: fetch_page
        type: shell_exec
        register: fetch_page
        params:
          command: |
            python3 -c '
            import json, os, sys, ssl, urllib.request, urllib.parse, base64

            server = os.environ["JIRA_SERVER"]
            user = os.environ["JIRA_USER"]
            token = os.environ["JIRA_TOKEN"]
            jql = sys.argv[1]
            max_results = int(sys.argv[2])
            start_at = int(sys.argv[3])

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            creds = base64.b64encode(f"{user}:{token}".encode()).decode()
            headers = {"Authorization": f"Basic {creds}", "Content-Type": "application/json"}

            issues = []
            total = 0
            remaining = max_results
            offset = start_at

            while remaining > 0:
                batch = min(50, remaining)
                params = urllib.parse.urlencode({"jql": jql, "startAt": offset, "maxResults": batch, "fields": "key"})
                url = f"{server}/rest/api/2/search?{params}"
                req = urllib.request.Request(url, headers=headers)
                with urllib.request.urlopen(req, context=ctx) as resp:
                    data = json.loads(resp.read())
                total = data.get("total", 0)
                page_issues = data.get("issues", [])
                for issue in page_issues:
                    issues.append({"key": issue["key"]})
                if not page_issues or offset + batch >= total:
                    break
                offset += len(page_issues)
                remaining -= len(page_issues)

            json.dump({"issues": issues, "total": total}, sys.stdout)
            ' '{{ jql }}' '{{ batch_size }}' '{{ batch_offset }}'

      # Parse the fetch output into a native object. fromjson
      # deserializes the JSON string into a map with "issues" (list)
      # and "total" (int). page_data.issues is referenced directly
      # by the for_each below via resolveContextPath.
      - name: parse_page
        type: set_fact
        vars:
          page_data: "{{ fetch_page.stdout | fromjson }}"

      # Extract the total result count for the pagination gate.
      # batch_total is the full Jira backlog size, not just this page.
      - name: extract_total
        type: set_fact
        vars:
          batch_total: "{{ page_data.total }}"

      # Fan out to per-ticket sub-workflows for this page.
      # page_data.issues resolves to the native list via context path
      # resolution — no template rendering needed.
      - name: process_tickets
        for_each: "page_data.issues"
        for_each_key: "key"
        for_each_sort: "key"
        as: ticket
        concurrency: 10
        workflow: per-ticket
        vars:
          issue: "{{ ticket.key }}"
          model: "{{ model }}"

      # Advance the offset past this page for the next iteration.
      # batch_size is the page size (how many we requested), which
      # matches the number fetched unless we're on the last page.
      - name: advance_offset
        type: set_fact
        vars:
          batch_offset: "{{ batch_offset + batch_size }}"

      # Gate: check if more tickets remain in the backlog.
      # batch_done (salience 200) fires when offset >= total → skip (stop).
      # batch_has_more (salience 100) fires when offset < total → continue.
      - name: pagination_gate
        type: gate
        rules:
          - batch_has_more
          - batch_done

      # Recurse with the advanced offset to fetch the next page.
      - name: next_page
        when: "batch_offset < batch_total"
        workflow: batch-loop
        vars:
          jql: "{{ jql }}"
          model: "{{ model }}"
          batch_size: "{{ batch_size }}"
          batch_offset: "{{ batch_offset }}"

  # ------------------------------------------------------------------
  # per-ticket
  #
  # Full RFE lifecycle for a single RHAIRFE ticket:
  #   Phase 1: Ensure RFE artifacts exist (with retry)
  #   Phase 2: Evaluate review quality and gate progression
  #   Phase 3: Strategy creation, refinement, and review
  #   Phase 4: Security review
  #   Phase 5: Epic creation and per-epic fan-out
  #
  # All steps are idempotent — they check for existing artifacts before
  # launching agent jobs. If rfe_artifacts_ready is false (speedrun
  # failed after 3 retries), downstream steps are silently skipped
  # rather than crashing the batch.
  # ------------------------------------------------------------------
  - name: per-ticket
    description: "Full RFE pipeline for a single issue"

    vars:
      issue: null
      model: opus

    steps:

      # ── Phase 1: RFE artifact generation ───────────────────────

      # Delegate to rfe-speedrun-retry, which recursively attempts the
      # rfe-speedrun skill up to 3 times until both task and review
      # artifacts exist. See the rfe-speedrun-retry workflow below.
      - name: ensure_rfe_artifacts
        workflow: rfe-speedrun-retry
        vars:
          issue: "{{ issue }}"
          model: "{{ model }}"
          retries_remaining: 3

      # Load the artifacts that rfe-speedrun should have produced.
      # Both are optional so a failed speedrun (after 3 retries) won't
      # crash the workflow — we check rfe_artifacts_ready below instead.
      - name: load_rfe_results
        type: load_artifact
        artifacts:
          task:
            path: "/app/artifacts/rfe-tasks/{{ issue }}.md"
            format: markdown
            source: local
            optional: true
          review:
            path: "/app/artifacts/rfe-reviews/{{ issue }}-review.md"
            format: markdown
            source: local
            optional: true

      # Gate flag: if either artifact is missing, all downstream steps
      # are skipped for this ticket. This prevents one bad ticket from
      # failing the entire batch.
      - name: check_rfe_artifacts
        type: set_fact
        vars:
          rfe_artifacts_ready: "load_rfe_results.artifacts.task != None and load_rfe_results.artifacts.review != None"

      # Check if a strategy already exists for this RFE. The strat-create
      # skill writes a symlink at /app/artifacts/strat-tasks/{RFE-KEY}.md
      # pointing to the actual RHAISTRAT-*.md file.
      - name: check_strat_exists
        type: load_artifact
        when: "rfe_artifacts_ready"
        artifacts:
          strat_task:
            path: "/app/artifacts/strat-tasks/{{ issue }}.md"
            format: markdown
            source: local
            optional: true
          strat_skipped:
            path: "/app/artifacts/strat-skipped/{{ issue }}.md"
            format: markdown
            source: local
            optional: true

      # ── Phase 2: Evaluate review quality ───────────────────────

      # Extract key facts from the RFE artifacts for gate evaluation.
      # review_passed and review_score feed the quality gate rules.
      # strat_key extracts the RHAISTRAT-* identifier from the symlinked
      # strat task's frontmatter (strat_id field).
      - name: eval_conditions
        type: set_fact
        when: "rfe_artifacts_ready"
        vars:
          review_passed: "load_rfe_results.artifacts.review.frontmatter.pass == true and load_rfe_results.artifacts.review.frontmatter.recommendation != 'reject'"
          review_score: "{{ load_rfe_results.artifacts.review.frontmatter.score }}"
          already_submitted: "load_rfe_results.artifacts.task.frontmatter.status == 'Submitted'"
          strat_exists: "check_strat_exists.artifacts.strat_task != None"
          strat_skipped: "check_strat_exists.artifacts.strat_skipped != None"
          strat_key: "{{ check_strat_exists.artifacts.strat_task.frontmatter.strat_id }}"

      # Load existing strat review and security review artifacts to
      # determine which strategy steps can be skipped (idempotency).
      - name: load_strat_artifacts
        type: load_artifact
        when: "rfe_artifacts_ready and strat_exists"
        artifacts:
          strat_review:
            path: "/app/artifacts/strat-reviews/{{ strat_key }}-review.md"
            format: markdown
            source: local
            optional: true
          security_review:
            path: "/app/artifacts/security-reviews/{{ strat_key }}-security-review.md"
            format: markdown
            source: local
            optional: true

      # Compute idempotency flags for strategy steps. Each flag
      # prevents re-running a step whose output already exists.
      - name: eval_strat_status
        type: set_fact
        vars:
          strat_already_refined: "check_strat_exists.artifacts.strat_task.frontmatter.status == 'Refined'"
          strat_already_reviewed: "load_strat_artifacts.artifacts.strat_review != None"
          strat_already_security_reviewed: "load_strat_artifacts.artifacts.security_review != None"

      # ── Quality gate ───────────────────────────────────────────

      # Rules engine evaluates review_score against thresholds.
      # score >= 8 → auto-approve (continue), 4-7 → needs attention
      # (pause, currently a no-op), < 4 → reject (skip, sets
      # rfe_rejected which blocks all downstream steps).
      - name: review_quality_gate
        type: gate
        rules:
          - rfe_auto_approve
          - rfe_needs_attention
          - rfe_not_passing
          - rfe_reject

      # ── Phase 3: Strategy pipeline ─────────────────────────────

      # Submit the RFE to the RHAIRFE Jira project if not already done.
      - name: rfe_submit
        type: agent_job
        when: "rfe_artifacts_ready and not already_submitted and not rfe_rejected"
        params:
          command: ["/bin/bash"]
          args:
            - /app/scripts/run_skill.sh
            - --skill
            - rfe-submit
            - --issue
            - "{{ issue }}"
            - --model
            - "{{ model }}"

      # Tag the RFE ticket with the strat-creator label so the
      # strategy skill knows to process it. Uses curl directly since
      # this is a simple REST call, not a full agent invocation.
      - name: add_strat_label
        type: agent_job
        when: "rfe_artifacts_ready and not strat_exists and not strat_skipped and not rfe_rejected"
        params:
          command: ["/bin/sh", "-c"]
          args:
            - |
              curl -sfk -X PUT \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_TOKEN" \
                "$JIRA_SERVER/rest/api/2/issue/{{ issue }}" \
                -d '{"update":{"labels":[{"add":"strat-creator-3.5"}]}}'

      - name: ensure_strategy_created
        when: "rfe_artifacts_ready and not strat_exists and not strat_skipped and not rfe_rejected"
        workflow: strategy-create-retry
        vars:
          issue: "{{ issue }}"
          model: "{{ model }}"
          retries_remaining: 3

      # After strategy_create, the strat_key is still empty because
      # eval_conditions ran before the create. Re-load the symlinked
      # strat task to pick up the newly-created RHAISTRAT key.
      - name: reload_strat_after_create
        type: load_artifact
        when: "rfe_artifacts_ready and not strat_skipped and not rfe_rejected"
        artifacts:
          strat_task_new:
            path: "/app/artifacts/strat-tasks/{{ issue }}.md"
            format: markdown
            source: local
            optional: true
          strat_skipped_new:
            path: "/app/artifacts/strat-skipped/{{ issue }}.md"
            format: markdown
            source: local
            optional: true

      - name: refresh_strat_key
        type: set_fact
        when: "rfe_artifacts_ready and not strat_skipped and not rfe_rejected"
        vars:
          strat_exists: "reload_strat_after_create.artifacts.strat_task_new != None"
          strat_skipped: "reload_strat_after_create.artifacts.strat_skipped_new != None"
          strat_key: "{{ reload_strat_after_create.artifacts.strat_task_new.frontmatter.strat_id }}"

      - name: ensure_strategy_refined
        when: "strat_exists and not rfe_rejected and not strat_already_refined"
        workflow: strategy-refine-retry
        vars:
          strat_key: "{{ strat_key }}"
          model: "{{ model }}"
          retries_remaining: 3

      - name: ensure_strategy_reviewed
        when: "strat_exists and not rfe_rejected and not strat_already_reviewed"
        workflow: strategy-review-retry
        vars:
          strat_key: "{{ strat_key }}"
          model: "{{ model }}"
          retries_remaining: 3

      # Load the final strat review to extract the recommendation.
      # Not optional — if we got this far, the review should exist.
      - name: load_strat_review_result
        type: load_artifact
        when: "strat_exists and not rfe_rejected"
        artifacts:
          strat_review_final:
            path: "/app/artifacts/strat-reviews/{{ strat_key }}-review.md"
            format: markdown
            source: local
            optional: true

      # Extract the review recommendation for downstream gating.
      - name: eval_review_result
        type: set_fact
        when: "strat_exists and not rfe_rejected"
        vars:
          strat_review_passed: "load_strat_review_result.artifacts.strat_review_final != None and load_strat_review_result.artifacts.strat_review_final.frontmatter.recommendation == 'approve'"

      # ── Phase 4: Security review ───────────────────────────────

      # Gate: skip if security review artifact already exists.
      - name: security_review_gate
        type: gate
        rules:
          - strat_skip_if_security_reviewed

      - name: ensure_security_reviewed
        when: "not rfe_rejected and strat_review_passed and not strat_already_security_reviewed"
        workflow: security-review-retry
        vars:
          strat_key: "{{ strat_key }}"
          model: "{{ model }}"
          retries_remaining: 3

      # Load the security review result to check the verdict.
      - name: load_security_review_result
        type: load_artifact
        when: "not rfe_rejected and strat_review_passed"
        artifacts:
          security_review_final:
            path: "/app/artifacts/security-reviews/{{ strat_key }}-security-review.md"
            format: markdown
            source: local
            optional: true

      # Extract security verdict for epic creation gating.
      - name: eval_security_result
        type: set_fact
        when: "not rfe_rejected and strat_review_passed"
        vars:
          security_review_passed: "load_security_review_result.artifacts.security_review_final != None and load_security_review_result.artifacts.security_review_final.frontmatter.verdict == 'PASS'"

      # ── Phase 5: Epic creation and fan-out ─────────────────────

      # Check for an existing epic receipt artifact. The epic-create
      # skill writes this after creating epics, so its presence means
      # epics already exist and we can skip creation.
      - name: check_epics_exist
        type: load_artifact
        when: "not rfe_rejected and strat_review_passed and security_review_passed"
        artifacts:
          epic_receipt:
            path: "/app/artifacts/epic-receipts/{{ strat_key }}.md"
            format: markdown
            source: local
            optional: true

      - name: ensure_epics_created
        when: "not rfe_rejected and strat_review_passed and security_review_passed and check_epics_exist.artifacts.epic_receipt == None"
        workflow: epic-create-retry
        vars:
          strat_key: "{{ strat_key }}"
          model: "{{ model }}"
          retries_remaining: 3

      # Load the receipt to get the list of created epics for fan-out.
      # Optional because epic_create may have been skipped or failed.
      - name: load_epic_receipt
        type: load_artifact
        when: "not rfe_rejected and strat_review_passed and security_review_passed"
        artifacts:
          receipt:
            path: "/app/artifacts/epic-receipts/{{ strat_key }}.md"
            format: markdown
            source: local
            optional: true

      # Fan out a sub-workflow per epic. Uses for_each_key for stable
      # iteration keys (RHOAIENG-XXXXX) and for_each_sort for
      # deterministic order. Currently a stub — the epic-breakdown
      # workflow will eventually create child tasks/stories per epic.
      - name: per_epic_work
        when: "load_epic_receipt.artifacts.receipt != None"
        for_each: "load_epic_receipt.artifacts.receipt.frontmatter.epics"
        for_each_key: "key"
        for_each_sort: "key"
        as: epic
        concurrency: 10
        workflow: epic-breakdown
        vars:
          epic_key: "{{ epic.key }}"
          epic_type: "{{ epic.type }}"
          epic_title: "{{ epic.title }}"
          strat_key: "{{ strat_key }}"
          model: "{{ model }}"

  # ------------------------------------------------------------------
  # rfe-speedrun-retry
  #
  # Recursive retry loop for the rfe-speedrun skill. The CLI runner
  # (claude --print) occasionally produces a noop — the agent exits
  # after setup without writing artifacts (see bugs/rfe-speedrun-noop.md).
  #
  # This workflow checks for the expected artifacts, and if missing,
  # runs the speedrun and recurses with a decremented retry counter.
  # Three gate rules control the loop:
  #
  #   artifacts_ready (salience 200) → skip, we're done
  #   retry_exhausted (salience 150) → skip, give up gracefully
  #   retry_continue  (salience 100) → continue, run again
  #
  # On exhaustion, the parent workflow's rfe_artifacts_ready flag will
  # be false, silently skipping all downstream steps for this ticket.
  # ------------------------------------------------------------------
  - name: rfe-speedrun-retry
    vars:
      issue: null
      model: opus
      retries_remaining: 3

    steps:

      # Check if both required artifacts already exist on the PVC.
      - name: check_artifacts
        type: load_artifact
        artifacts:
          task:
            path: "/app/artifacts/rfe-tasks/{{ issue }}.md"
            format: markdown
            source: local
            optional: true
          review:
            path: "/app/artifacts/rfe-reviews/{{ issue }}-review.md"
            format: markdown
            source: local
            optional: true

      # Compute a single boolean: do we have everything we need?
      - name: eval_retry_state
        type: set_fact
        vars:
          artifacts_ready: "check_artifacts.artifacts.task != None and check_artifacts.artifacts.review != None"

      # Rules engine decides: skip (done or exhausted) or continue (retry).
      - name: retry_gate
        type: gate
        rules:
          - retry_artifacts_ready
          - retry_continue
          - retry_exhausted

      # Run the rfe-speedrun agent job. Only fires if artifacts are
      # missing and retries remain.
      - name: run_speedrun
        type: agent_job
        when: "not artifacts_ready and retries_remaining > 0"
        params:
          command: ["/bin/bash"]
          args:
            - /app/scripts/run_skill.sh
            - --skill
            - rfe-speedrun
            - --issue
            - "{{ issue }}"
            - --model
            - "{{ model }}"

      # Decrement the retry counter before recursing.
      - name: decrement_retries
        type: set_fact
        when: "not artifacts_ready and retries_remaining > 0"
        vars:
          retries_remaining: "{{ retries_remaining - 1 }}"

      # Recurse: re-enter this workflow with the decremented counter.
      # On re-entry, check_artifacts runs again to see if the speedrun
      # wrote the files. If yes, retry_artifacts_ready fires and we
      # exit. If no, we try again until retries_remaining hits 0.
      - name: recurse
        when: "not artifacts_ready and retries_remaining > 0"
        workflow: rfe-speedrun-retry
        vars:
          issue: "{{ issue }}"
          model: "{{ model }}"
          retries_remaining: "{{ retries_remaining }}"

